<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LaxHornet Logo Options</title>
    <style>
      :root {
        --navy: #0b0c0e;
        --red: #d71920;
        --white: #ffffff;
        --gray: #d7dce2;
        --black: #050505;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 24px;
        background: linear-gradient(180deg, #17191d, #050505);
        color: var(--white);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        max-width: 980px;
        margin: 0 auto;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(1.6rem, 5vw, 2.5rem);
        line-height: 1.05;
      }

      p {
        margin: 0 0 22px;
        color: var(--gray);
      }

      .grid {
        display: grid;
        gap: 18px;
      }

      .option {
        padding: 16px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.06);
      }

      .option h2 {
        margin: 0 0 12px;
        color: var(--gray);
        font-size: 0.9rem;
        text-transform: uppercase;
      }

      .logo-frame {
        display: grid;
        min-height: 118px;
        place-items: center;
        padding: 12px;
        border-radius: 8px;
        background: linear-gradient(135deg, #181a1f, #050505);
      }

      img {
        display: block;
        width: 100%;
        max-width: 760px;
        height: auto;
      }

      code {
        display: block;
        margin-top: 10px;
        color: var(--gray);
        font-size: 0.82rem;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>LaxHornet Selected Logo</h1>
      <p>Using the supplied PNG wordmark in the app header.</p>

      <section class="grid" aria-label="Logo options">
        <article class="option">
          <h2>Selected - Supplied Wordmark</h2>
          <div class="logo-frame"><img src="assets/laxhornet-logo.png" alt="LaxHornet supplied wordmark" /></div>
          <code>assets/laxhornet-logo.png</code>
        </article>
      </section>
    </main>
  </body>
</html>
